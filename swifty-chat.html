<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f4ef;
      font-family: sans-serif;
      padding: 24px;
    }
    h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1E1E1E;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.95rem;
      color: #544946;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <h2>Ask our AI!</h2>
  <p>Have questions about Interfolio? Our AI searches the Interfolio Help Center to find personalized answers and links directly to the source. It can also respond in the language you ask in.</p>

  <script>
    helpjuice_account_url = 'https://product-help.interfolio.com';
    helpjuice_contact_us_url = 'https://product-help.interfolio.com/contact-us';
    helpjuiceSwiftyConfig = {
      subdomain: 'interfolio',
      widgetPosition: '',
      themeColor: '#2577A6',
      linksColor: '#2577A6',
      chatHeader: 'Interfolio AI chat',
      chatWelcomeHeader: 'Ask Interfolio AI',
      chatWelcomeMessage: 'Our AI scans all help articles to give you a personalized answer to your specific question. AI may make mistakes. Verify important information.',
      chatInputPlaceholder: 'Ask, write, or search for anything...',
      chatIconUrl: '',
      chatNoResultsMessage: 'Sorry, we couldn\'t find any results. Please contact our team for further assistance. https://product-help.interfolio.com/contact-us'
    };
  </script>
  <script src='https://product-help.interfolio.com/swifty_chat.js'></script>

</body>
</html>
